<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs>
    <!-- Soft Ambient Ground Shadow -->
    <filter id="shadowBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="16" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.55"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Intense Neon Backlight Glow -->
    <filter id="neonGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Rich Magic Liquid Gradient -->
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff33b4" stop-opacity="1"/>
      <stop offset="40%" stop-color="#e6007e" stop-opacity="0.98"/>
      <stop offset="85%" stop-color="#800045" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#470026" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Liquid Top Surface Radial Highlight -->
    <radialGradient id="liquidSurfaceGlow" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="30%" stop-color="#ffc2eb" stop-opacity="0.65"/>
      <stop offset="65%" stop-color="#ff1a9e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff1a9e" stop-opacity="0"/>
    </radialGradient>

    <!-- Crystal Glass Body Gradient -->
    <linearGradient id="glassBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="25%" stop-color="#ffaae5" stop-opacity="0.15"/>
      <stop offset="65%" stop-color="#ff33b4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Glowing Crystal Rim Gradient -->
    <linearGradient id="rimStrokeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="20%" stop-color="#ffb8e8" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ff33b4" stop-opacity="1"/>
      <stop offset="80%" stop-color="#ffb8e8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Deep Ground Shadow -->
  <ellipse cx="300" cy="355" rx="220" ry="36" fill="#1f0218" opacity="0.65" filter="url(#shadowBlur)" />

  <!-- Outer Neon Magenta Backdrop Aura -->
  <path d="M 100 140 C 100 370, 500 370, 500 140 Z" fill="#ff1a9e" opacity="0.22" filter="url(#neonGlow)" />

  <!-- Deep Crystal Glass Chalice Outer Shell -->
  <path d="M 85 140 C 85 365, 515 365, 515 140 C 440 160, 160 160, 85 140 Z" fill="url(#glassBodyGrad)" stroke="url(#rimStrokeGrad)" stroke-width="4.5" opacity="0.96" />

  <!-- Liquid Deep Interior Backing -->
  <path d="M 95 140 C 95 348, 505 348, 505 140 C 430 162, 170 162, 95 140 Z" fill="#4d0029" opacity="0.95" />

  <!-- Liquid Main Volume Fill -->
  <path d="M 98 140 C 98 340, 502 340, 502 140 C 420 160, 180 160, 98 140 Z" fill="url(#liquidGrad)" />

  <!-- Liquid Top Surface Ellipse -->
  <ellipse cx="300" cy="140" rx="202" ry="46" fill="url(#liquidGrad)" />

  <!-- Liquid Surface Radial Glow Highlight -->
  <ellipse cx="268" cy="135" rx="150" ry="26" fill="url(#liquidSurfaceGlow)" />

  <!-- Liquid Surface Rim Inner Stroke -->
  <ellipse cx="300" cy="140" rx="202" ry="46" fill="none" stroke="#ffaae5" stroke-width="2.5" opacity="0.8" />

  <!-- Glass Front Curvature Specular Refractions -->
  <!-- Left Main Curved Highlight -->
  <path d="M 125 170 C 145 280, 230 335, 290 345" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.65" />
  <path d="M 110 155 C 130 260, 205 315, 260 330" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.4" />

  <!-- Right Side Curvature Refraction -->
  <path d="M 475 170 C 455 270, 390 325, 340 338" fill="none" stroke="#ffaae5" stroke-width="4" stroke-linecap="round" opacity="0.45" />

  <!-- Glass Top Rim Outer Glowing Ring -->
  <ellipse cx="300" cy="138" rx="215" ry="48" fill="none" stroke="url(#rimStrokeGrad)" stroke-width="9" />
  <ellipse cx="300" cy="135" rx="211" ry="44" fill="none" stroke="#ffffff" stroke-width="3.5" opacity="0.92" />

  <!-- Side Decorative Crystal Handles / Accent Gems -->
  <!-- Left Gem Handle -->
  <path d="M 72 135 C 45 135, 45 180, 80 195 C 60 175, 65 150, 72 135 Z" fill="url(#rimStrokeGrad)" stroke="#ffffff" stroke-width="2" opacity="0.9" />
  <circle cx="60" cy="160" r="5" fill="#ffffff" opacity="0.9" />

  <!-- Right Gem Handle -->
  <path d="M 528 135 C 555 135, 555 180, 520 195 C 540 175, 535 150, 528 135 Z" fill="url(#rimStrokeGrad)" stroke="#ffffff" stroke-width="2" opacity="0.9" />
  <circle cx="540" cy="160" r="5" fill="#ffffff" opacity="0.9" />

  <!-- Sparkle Stars on Rim -->
  <polygon points="300,115 304,123 312,127 304,131 300,139 296,131 288,127 296,123" fill="#ffffff" opacity="0.95" />
  <circle cx="145" cy="138" r="4.5" fill="#ffffff" opacity="0.9" />
  <circle cx="455" cy="138" r="4" fill="#ffffff" opacity="0.85" />
</svg>
